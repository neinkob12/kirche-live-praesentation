async function sbInsertVote(qkey, value) {

async function sbFetchStats() {

    headers: SB_HEADERS
  });
  const rows = await r.json();
  const baro = {}; // qkey -> {sum,count}
  const agree = {}; // qkey -> {a,d}
  for (const row of Array.isArray(rows) ? rows : []) {
    if (isAgree(row.qkey)) {
      const o = agree[row.qkey] = agree[row.qkey] || {
        a: 0,
        d: 0

      const o = baro[row.qkey] = baro[row.qkey] || {
        sum: 0,
        count: 0
      };
      o.sum += row.value;
      o.count++;
    }
  }
  const baroOut = k => {
    const o = baro[k];
    if (!o || !o.count) return {
      avg: 0,
      count: 0
    };
    return {
      avg: Math.round(o.sum / o.count),
      count: o.count
    };
  };

    q1_before: baroOut("q1_before"),
    q1_after: baroOut("q1_after"),
    q3: baroOut("q3"),

      a: 0,
      d: 0
    },
    q4: agree["q4"] || {
      a: 0,
      d: 0
    }
  };
}

const Store = {

    }
    try {
      if (typeof window !== "undefined" && window.storage && window.storage.getItem) {
        const v = await window.storage.getItem(key);
        if (v !== undefined && v !== null) return v;

    } catch (e) {

          method: "POST",
          headers: {

            v: val

        ok = true;
      }
    } catch (e) {}
    try {
      localStorage.setItem(key, val);
    } catch (e) {}
    return ok;
  }
};

// ---------- Count-up Hook für große Zahlen ----------
function useCountUp(target, dur = 1000) {
  const [v, setV] = useState(0);
  const ref = useRef(0);
  useEffect(() => {
    let raf;
    const from = 0;
    const start = performance.now();
    const tick = now => {
      const p = Math.min(1, (now - start) / dur);
      const eased = 1 - Math.pow(1 - p, 3);
      ref.current = from + (target - from) * eased;
      setV(ref.current);
      if (p < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [target, dur]);
  return v;
}
